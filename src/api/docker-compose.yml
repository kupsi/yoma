name: yoma-v3
services:
  postgres:
    image: postgres:16.9-alpine
    container_name: yoma-postgres
    # ports:
    #   - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=P@ssword1
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  # pgadmin:
  #   image: dpage/pgadmin4
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: root
  #   ports:
  #     - "80:80"

  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres-init:
    # Initialise the local postgresql server by populating a test user and organisation(s) for local dev
    image: postgres:17-alpine
    container_name: postgres-init
    depends_on:
      postgres:
        condition: service_healthy
      yoma-api-health:
        condition: service_completed_successfully
    volumes:
      - ./cicd/scripts/postgressql-init/post.sql:/post.sql
    environment:
      PGHOST: postgres
      POSTGRES_PASSWORD: P@ssword1
      POSTGRES_USER: postgres
      POSTGRES_DB: yoma-dev
      PGPORT: 5432
    command: >
      bash -c "PGPASSWORD=$$POSTGRES_PASSWORD psql -h $$PGHOST -U $$POSTGRES_USER -d $$POSTGRES_DB -f /post.sql"

  keycloak-init:
    # Initialise the local Keycloak server by adding the bcrypt & webhook provider
    image: alpine:3
    container_name: keycloak-init
    user: root
    command: |
      sh -c '
        # Install curl and unzip
        apk add --no-cache curl unzip &&

        # Download webhook providers
        curl -L https://github.com/vymalo/keycloak-webhook/releases/download/v0.9.1/keycloak-webhook-provider-core-0.9.1-all.jar -o /opt/keycloak/providers/keycloak-webhook-provider-core-0.9.1-all.jar &&
        curl -L https://github.com/vymalo/keycloak-webhook/releases/download/v0.9.1/keycloak-webhook-provider-http-0.9.1-all.jar -o /opt/keycloak/providers/keycloak-webhook-provider-http-0.9.1-all.jar &&
        curl -L https://github.com/vymalo/keycloak-webhook/releases/download/v0.9.1/keycloak-webhook-provider-amqp-0.9.1-all.jar -o /opt/keycloak/providers/keycloak-webhook-provider-amqp-0.9.1-all.jar &&
        curl -L https://github.com/vymalo/keycloak-webhook/releases/download/v0.9.1/keycloak-webhook-provider-syslog-0.9.1-all.jar -o /opt/keycloak/providers/keycloak-webhook-provider-syslog-0.9.1-all.jar &&

        # Copy phone provider JARs
        cp /local-providers/keycloak-phone-provider.jar /local-providers/keycloak-phone-provider.resources.jar /local-providers/keycloak-sms-provider-dummy.jar /local-providers/email-required-authenticator.jar /opt/keycloak/providers/ &&

        # Extract theme resources from the resources JAR
        mkdir -p /tmp/theme-extract &&
        cd /tmp/theme-extract &&
        unzip -o -q /local-providers/keycloak-phone-provider.resources.jar &&

        # Copy theme files to the themes directory
        if [ -d "theme" ]; then
          cp -r theme/* /opt/keycloak/themes/
        fi &&

        # Set proper ownership
        chown -R 1000:1000 /opt/keycloak/providers /opt/keycloak/themes
      '
    volumes:
      - keycloak:/opt/keycloak/providers
      - keycloak-themes:/opt/keycloak/themes
      - ../keycloak/providers/jars:/local-providers # our custom JAR folder, mounted in a separate directory and copied to container

  keycloak-pg:
    image: postgres:17-alpine
    container_name: keycloak-pg
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak"]
      interval: 10s
      timeout: 5s
      retries: 3

  keycloak:
    # Local Keycloak server
    image: quay.io/keycloak/keycloak:26.4.0
    container_name: keycloak
    environment:
      WEBHOOK_EVENTS_TAKEN: "LOGIN,REGISTER,UPDATE_PROFILE"
      WEBHOOK_HTTP_BASE_PATH: "http://yoma-api:5000/api/v3/webhook/keycloak"
      WEBHOOK_HTTP_AUTH_USERNAME: whAdmin
      WEBHOOK_HTTP_AUTH_PASSWORD: password
      KC_DB_URL: jdbc:postgresql://keycloak-pg/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: true

      # Uncomment when exposing Keycloak via ngrok for SSO partner testing.
      # When set, Keycloak stamps these URLs as the token issuer for browser
      # flows, which breaks local logins (issuer mismatch on refresh).
      # KC_HOSTNAME_URL: "https://unshaven-divinely-panhandle.ngrok-free.dev"
      # KC_HOSTNAME_ADMIN_URL: "https://unshaven-divinely-panhandle.ngrok-free.dev"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8091

      # override Keycloak hostname for social provider redirects
      # KC_HOSTNAME: "localhost"
      # KC_HOSTNAME_STRICT: "false"
      # KEYCLOAK_FRONTEND_URL: "http://localhost:8080"

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_LOG_LEVEL: INFO
      # Custom providers
      KC_SPI_PHONE_DEFAULT_SERVICE: dummy
      # Twilio Configuration - supports both SMS & WhatsApp
      # KC_SPI_PHONE_DEFAULT_SERVICE: twilio
      # KC_SPI_MESSAGE_SENDER_SERVICE_TWILIO_ACCOUNT: your_account_sid
      # KC_SPI_MESSAGE_SENDER_SERVICE_TWILIO_TOKEN: your_auth_token
      # KC_SPI_MESSAGE_SENDER_SERVICE_TWILIO_NUMBER: your_number
      # KC_SPI_MESSAGE_SENDER_SERVICE_TWILIO_WHATSAPP_NUMBER: your_number
      # KC_SPI_MESSAGE_SENDER_SERVICE_TWILIO_WHATSAPP_APP_HASH: your_app_hash
      # KC_SPI_MESSAGE_SENDER_SERVICE_TWILIO_WHATSAPP_TEMPLATE_ID: your_template_id
      KC_SPI_PHONE_DEFAULT_TOKEN_EXPIRES_IN: 300 # sms expires, 5 mins
      # Notice: will match after canonicalize number. eg: INTERNATIONAL: +41 44 668 18 00 , NATIONAL: 044 668 18 00 , E164: +41446681800
      KC_SPI_PHONE_DEFAULT_YOMA_DEFAULT_NUMBER_REGEX: ^\\+?\\d+$
      # Test phone numbers for synthetic tests - accepts hardcoded OTP '1234' and skips SMS
      # Format: comma-separated list of phone numbers
      TEST_PHONE_NUMBERS: "+27123456789"
    ports:
      - 0.0.0.0:8091:8091
      - 0.0.0.0:9090:9000
    command:
      - start-dev
      - --db=postgres
      - --features=preview,declarative-ui
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
      keycloak-pg:
        condition: service_healthy
    volumes:
      - keycloak:/opt/keycloak/providers
      - keycloak-themes:/opt/keycloak/themes

  keycloak-health:
    # Wait for Keycloak to be ready before running keycloak-config service
    image: curlimages/curl
    container_name: keycloak-health
    restart: "no"
    command: /bin/sh -c "until curl -fsS http://keycloak:9000/health/ready; do sleep 5; done"
    depends_on:
      keycloak:
        condition: service_started

  keycloak-config:
    # Import Keycloak configuration
    image: adorsys/keycloak-config-cli:6.4.0-26.1.0
    container_name: keycloak-config
    environment:
      KEYCLOAK_URL: "http://keycloak:8091/"
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: password
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: "120s"
      IMPORT_FILES_LOCATIONS: "/config/*.yaml"
      IMPORT_VALIDATE: "true"
      LOGGING_LEVEL_ROOT: "INFO"
      IMPORT_VAR_SUBSTITUTION_ENABLED: "true"
      IMPORT_CACHE_ENABLED: "false"
      # SPRING_CONFIG_IMPORT: /secrets/.decrypted~secret.yaml
      # Templating variables
      CLIENT_YOMA_API_URL: "http://localhost:5000"
      CLIENT_YOMA_WEB_URL: "http://localhost:3000"
      CLIENT_ATINGI_ENABLED: "true"
      CLIENT_ATINGI_URL: "https://preprod.atingi.org"
      CLIENT_ATINGI_URL_POST_LOGOUT_REDIRECT: "https://keycloak-preprod.enovationaws.com/realms/master/broker/yoma-prod/endpoint"
      CLIENT_P2E_GLOBAL_ENABLED: "true"
      CLIENT_P2E_GLOBAL_URL: "https://global.passport2earning.org"
      CLIENT_P2E_GLOBAL_URL_REDIRECT: "https://PLACEHOLDER.b2clogin.com/PLACEHOLDER.onmicrosoft.com/oauth2/authresp"
      CLIENT_P2E_GLOBAL_SECRET: superSecretP2EGlobalClientSecret
      CLIENT_GOODWALL_ENABLED: "true"
      CLIENT_GOODWALL_URL: "https://www.goodwall.io"
      CLIENT_GOODWALL_URL_REDIRECT: "goodwallauth://yomaredirect"
      CLIENT_YOMA_API_SECRET: superSecretYomaApiClientSecret
      CLIENT_YOMA_WEB_SECRET: superSecretYomaWebClientSecret
      CLIENT_ATINGI_SECRET: superSecretAtingiClientSecret
      CLIENT_GOODWALL_SECRET: superSecretAtingiClientSecret
      CLIENT_IIASA_ENABLED: "true"
      CLIENT_IIASA_SECRET: superSecretIIASAClientSecret
      CLIENT_IIASA_URL: https://localhost:44345
      CLIENT_IIASA_URL_REDIRECT: https://localhost:44345/signin-yoma-oidc
      CLIENT_IXO_ENABLED: "true"
      CLIENT_IXO_URL: https://jambo.test.yoma.impacts.exchange
      CLIENT_IXO_URL_REDIRECT: https://jambo.test.yoma.impacts.exchange/auth/passkey
      CLIENT_IXO_WEBOS_ENABLED: "true"
      CLIENT_IXO_WEBOS_SECRET: superSecretIXOClientSecret
      CLIENT_IXO_WEBOS_URL: https://auth.workos.com
      CLIENT_IXO_WEBOS_URL_REDIRECT: https://auth.workos.com/sso/oidc/n3WhYIVxmfOSY4sQ2Unz7w3ee/callback
      CLIENT_MAZA_APP_ENABLED: "true"
      CLIENT_MAZA_APP_SECRET: superSecretMazaAppClientSecret
      CLIENT_UNICEF_KENYA_ENABLED: "true"
      CLIENT_UNICEF_KENYA_SECRET: superSecretUnicefKenyaClientSecret
      CLIENT_MINI_SASS_ENABLED: "true"
      CLIENT_MINI_SASS_URL: "http://localhost:5000"
      CLIENT_MINI_SASS_URL_REDIRECT: "http://localhost:5000/authentication/api/yoma/callback"
      CLIENT_MINI_SASS_SECRET: superSecretMiniSassClientSecret
      SA_YOMA_API_PASSWORD: &KCAdminPassword superSecretYomaApiServiceAccountPassword
      SMTP_PASSWORD: superSecretSmtpPassword
      GOOGLE_CLIENT_ID: superSecretClientId
      GOOGLE_CLIENT_SECRET: superSecretClientSecret
      FACEBOOK_CLIENT_ID: superSecretClientId
      FACEBOOK_CLIENT_SECRET: superSecretClientSecret
    volumes:
      - ../keycloak/exports:/config
      - ./cicd/secrets:/secrets
    depends_on:
      keycloak-health:
        condition: service_completed_successfully
  #     sops:
  #       condition: service_completed_successfully

  # sops: # Decrypt secrets
  #   container_name: sops
  #   image: mozilla/sops:latest
  #   command:
  #     [
  #       "/bin/sh",
  #       "-c",
  #       "sops --config /secrets/.sops.yaml -d /secrets/secret.yaml > /secrets/.decrypted~secret.yaml",
  #     ]
  #   volumes:
  #     - ./cicd/secrets:/secrets
  #     - ~/.aws:/root/.aws

  keycloak-users:
    image: curlimages/curl
    container_name: keycloak-users
    environment:
      KC_BASE_URL: http://keycloak:8091
      KC_REALM: yoma
      KC_CLIENT_ID: admin-cli
      KC_ADMIN_USER: sa-yoma-api
      KC_ADMIN_PASSWORD: *KCAdminPassword
      KC_ADMIN_REALM: master
      ADMIN_USER: testadminuser@gmail.com
      ADMIN_USER_PASSWORD: P@ssword12
      ORG_ADMIN_USER: testorgadminuser@gmail.com
      ORG_ADMIN_USER_PASSWORD: P@ssword12
      TEST_USER: testuser@gmail.com
      TEST_USER_PASSWORD: P@ssword12
      YOMA_SYSTEM_USER: system@yoma.world
      YOMA_SYSTEM_USER_PASSWORD: P@ssword12

    user: 0:0 # because we need to install jq
    command:
      - /bin/sh
      - -c
      - /sbin/apk add jq && /bin/sh /scripts/users.sh
    volumes:
      - ../keycloak/scripts/users.sh:/scripts/users.sh
    depends_on:
      keycloak-config:
        condition: service_completed_successfully
      yoma-api-health:
        condition: service_completed_successfully

  yoma-api:
    # Local Yoma API server
    # platform: linux/amd64 # Until we get multi-arch docker images
    image: ${REGISTRY:-local}/yoma-api:${API_TAG:-latest}
    container_name: yoma-api
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Local
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__SQLConnection: "Host=postgres;Port=5432;Database=yoma-dev;Username=postgres;Password=P@ssword1;SslMode=Prefer;Trust Server Certificate=True;Include Error Detail=true;GSS Encryption Mode=Disable;"
      ConnectionStrings__RedisConnection: "valkey:6379"
      Logging__LogLevel__Default: "Debug"
      Logging__LogLevel__Microsoft: "Debug"
      Logging__LogLevel__Microsoft.Hosting.Lifetime: "Information"
      Logging__LogLevel__Microsoft.EntityFrameworkCore: "Error"
      AllowedOrigins: "http://localhost:5000;http://localhost:3000;http://localhost:3001" # can be set to wildcard * to allow all hosts
    env_file:
      - env.secrets
    ports:
      - "0.0.0.0:5000:5000"
    volumes:
      - yoma:/root/.aspnet/DataProtection-Keys
      - ./src/application/Yoma.Core.Api/appsettings.Local.json:/api/appsettings.Local.json
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  yoma-api-health:
    image: curlimages/curl
    container_name: yoma-api-health
    restart: "no"
    command: >
      /bin/sh -c " until curl -fsS 'http://yoma-api:5000/api/v3/lookup/skill?PageNumber=1&PageSize=10' | grep '\"totalCount\":\s*[1-9][0-9]*' > /dev/null; do
        echo 'API data not populated yet.';
        sleep 5;
      done; echo 'API data populated. Health check passed.'"
    depends_on:
      yoma-api:
        condition: service_started

  test-harness-health:
    # Wait for sqlserver-init to be finished.
    image: curlimages/curl
    container_name: test-harness-health
    restart: "no"
    command: /bin/sh -c "until curl -fsS http://yoma-api:5000/index.html; do sleep 5; done"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      keycloak-users:
        condition: service_completed_successfully

volumes:
  postgres:
  yoma:
  keycloak:
  keycloak-themes:
  keycloak-pg:
